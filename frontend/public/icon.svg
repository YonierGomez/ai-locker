<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1A2F4A"/>
    </linearGradient>
    <linearGradient id="lockerBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A4A6B"/>
      <stop offset="40%" stop-color="#1E3A55"/>
      <stop offset="100%" stop-color="#142840"/>
    </linearGradient>
    <linearGradient id="door" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3D5C"/>
      <stop offset="100%" stop-color="#112233"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0088CC"/>
    </linearGradient>
    <linearGradient id="ventGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,200,255,0.0)"/>
      <stop offset="50%" stop-color="rgba(0,200,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(0,200,255,0.0)"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#0077BB"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- App background -->
  <rect width="200" height="200" rx="42" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="200" height="80" rx="42" fill="rgba(255,255,255,0.03)"/>

  <!-- LOCKER BODY (main cabinet) -->
  <rect x="34" y="22" width="132" height="158" rx="10"
    fill="url(#lockerBody)" filter="url(#shadow)"/>

  <!-- Body top highlight -->
  <rect x="34" y="22" width="132" height="4" rx="3"
    fill="rgba(255,255,255,0.12)"/>

  <!-- Body left edge highlight -->
  <rect x="34" y="22" width="3" height="158" rx="2"
    fill="rgba(255,255,255,0.08)"/>

  <!-- DOOR PANEL -->
  <rect x="44" y="30" width="112" height="142" rx="7"
    fill="url(#door)" stroke="rgba(0,180,220,0.25)" stroke-width="1"/>

  <!-- Door top highlight -->
  <rect x="44" y="30" width="112" height="3" rx="2"
    fill="rgba(255,255,255,0.1)"/>

  <!-- VENTILATION SLOTS (top of door) -->
  <rect x="56" y="40" width="88" height="3.5" rx="1.75"
    fill="url(#ventGrad)" opacity="0.8"/>
  <rect x="56" y="47" width="88" height="3.5" rx="1.75"
    fill="url(#ventGrad)" opacity="0.6"/>
  <rect x="56" y="54" width="88" height="3.5" rx="1.75"
    fill="url(#ventGrad)" opacity="0.4"/>

  <!-- DOOR DIVIDER LINE (horizontal center) -->
  <rect x="44" y="100" width="112" height="1.5"
    fill="rgba(0,180,220,0.3)"/>

  <!-- CYAN ACCENT STRIPE (left edge of door) -->
  <rect x="44" y="30" width="4" height="142" rx="2"
    fill="url(#accentLine)" opacity="0.8"/>

  <!-- HANDLE / LATCH (right side) -->
  <rect x="136" y="88" width="10" height="26" rx="5"
    fill="url(#handleGrad)" filter="url(#glow)"/>
  <!-- Handle highlight -->
  <rect x="137.5" y="90" width="4" height="22" rx="2"
    fill="rgba(255,255,255,0.3)"/>

  <!-- LOCK MECHANISM (small circle near handle) -->
  <circle cx="128" cy="101" r="5"
    fill="#0A1828" stroke="rgba(0,200,255,0.6)" stroke-width="1.2"
    filter="url(#glow)"/>
  <circle cx="128" cy="101" r="2.5"
    fill="rgba(0,220,255,0.8)"/>

  <!-- AI LABEL area (center of door) -->
  <!-- Glowing panel -->
  <rect x="58" y="68" width="68" height="28" rx="6"
    fill="rgba(0,30,60,0.8)" stroke="rgba(0,180,255,0.3)" stroke-width="1"/>

  <!-- "AI" text rendered as shapes -->
  <!-- A - left stroke -->
  <rect x="66" y="72" width="3" height="18" rx="1.5" fill="rgba(0,200,255,0.9)"/>
  <!-- A - right stroke -->
  <rect x="75" y="72" width="3" height="18" rx="1.5" fill="rgba(0,200,255,0.9)"/>
  <!-- A - crossbar -->
  <rect x="66" y="80" width="12" height="2.5" rx="1.25" fill="rgba(0,200,255,0.9)"/>
  <!-- A - top peak -->
  <rect x="69" y="72" width="6" height="3" rx="1.5" fill="rgba(0,200,255,0.9)"/>

  <!-- I - top -->
  <rect x="86" y="72" width="10" height="2.5" rx="1.25" fill="rgba(0,200,255,0.9)"/>
  <!-- I - stem -->
  <rect x="89.5" y="74.5" width="3" height="11" rx="1.5" fill="rgba(0,200,255,0.9)"/>
  <!-- I - bottom -->
  <rect x="86" y="85.5" width="10" height="2.5" rx="1.25" fill="rgba(0,200,255,0.9)"/>

  <!-- Glow under AI text -->
  <rect x="58" y="68" width="68" height="28" rx="6"
    fill="rgba(0,180,255,0.05)" filter="url(#glow)"/>

  <!-- BOTTOM SECTION - file/data lines -->
  <rect x="58" y="108" width="68" height="52" rx="6"
    fill="rgba(0,20,45,0.7)" stroke="rgba(0,150,200,0.2)" stroke-width="0.8"/>

  <!-- Data line 1 -->
  <circle cx="65" cy="118" r="2" fill="rgba(0,220,255,0.7)"/>
  <rect x="70" y="116" width="38" height="3" rx="1.5" fill="rgba(0,180,220,0.5)"/>

  <!-- Data line 2 -->
  <circle cx="65" cy="127" r="2" fill="rgba(0,220,255,0.5)"/>
  <rect x="70" y="125" width="28" height="3" rx="1.5" fill="rgba(0,180,220,0.35)"/>

  <!-- Data line 3 -->
  <circle cx="65" cy="136" r="2" fill="rgba(0,220,255,0.4)"/>
  <rect x="70" y="134" width="34" height="3" rx="1.5" fill="rgba(0,180,220,0.25)"/>

  <!-- Data line 4 -->
  <circle cx="65" cy="145" r="2" fill="rgba(0,220,255,0.3)"/>
  <rect x="70" y="143" width="22" height="3" rx="1.5" fill="rgba(0,180,220,0.2)"/>

  <!-- FEET at bottom -->
  <rect x="44" y="174" width="16" height="6" rx="3"
    fill="#0A1828" stroke="rgba(0,150,200,0.3)" stroke-width="0.8"/>
  <rect x="140" y="174" width="16" height="6" rx="3"
    fill="#0A1828" stroke="rgba(0,150,200,0.3)" stroke-width="0.8"/>

  <!-- Sparkle dots (AI accent) -->
  <circle cx="158" cy="28" r="3.5" fill="#00E5FF" opacity="0.8" filter="url(#glow)"/>
  <circle cx="168" cy="40" r="2" fill="#7EC8FF" opacity="0.6"/>
  <circle cx="152" cy="42" r="1.5" fill="#00E5FF" opacity="0.4"/>

</svg>
