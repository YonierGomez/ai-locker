<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0F3460"/>
    </linearGradient>
    <linearGradient id="lockBodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A9EFF"/>
      <stop offset="100%" stop-color="#0066CC"/>
    </linearGradient>
    <linearGradient id="shackleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7EC8FF"/>
      <stop offset="100%" stop-color="#3A8FE8"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#007AFF" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect x="0" y="0" width="200" height="200" rx="44" fill="url(#bgGrad)"/>

  <!-- Subtle glow overlay -->
  <rect x="0" y="0" width="200" height="200" rx="44" fill="url(#glowGrad)"/>

  <!-- Top highlight -->
  <rect x="0" y="0" width="200" height="100" rx="44" fill="rgba(255,255,255,0.04)"/>

  <!-- SHACKLE (arc top of lock) -->
  <path d="M68 96 L68 72 Q68 44 100 44 Q132 44 132 72 L132 96"
    fill="none"
    stroke="url(#shackleGrad)"
    stroke-width="16"
    stroke-linecap="round"
    filter="url(#softShadow)"/>

  <!-- Shackle inner highlight -->
  <path d="M74 96 L74 73 Q74 52 100 52 Q126 52 126 73 L126 96"
    fill="none"
    stroke="rgba(255,255,255,0.25)"
    stroke-width="4"
    stroke-linecap="round"/>

  <!-- LOCK BODY -->
  <rect x="46" y="92" width="108" height="80" rx="16"
    fill="url(#lockBodyGrad)"
    filter="url(#softShadow)"/>

  <!-- Lock body top highlight -->
  <rect x="46" y="92" width="108" height="20" rx="16"
    fill="rgba(255,255,255,0.15)"/>

  <!-- Lock body bottom shadow -->
  <rect x="46" y="152" width="108" height="20" rx="16"
    fill="rgba(0,0,0,0.2)"/>

  <!-- KEYHOLE circle -->
  <circle cx="100" cy="126" r="14"
    fill="rgba(0,0,0,0.4)"
    stroke="rgba(255,255,255,0.3)"
    stroke-width="1.5"/>

  <!-- Keyhole top circle -->
  <circle cx="100" cy="122" r="6"
    fill="rgba(255,255,255,0.9)"
    filter="url(#glow)"/>

  <!-- Keyhole slot -->
  <rect x="97" y="126" width="6" height="10" rx="3"
    fill="rgba(255,255,255,0.9)"
    filter="url(#glow)"/>

  <!-- AI sparkle dots top right -->
  <circle cx="148" cy="36" r="4" fill="#00E5FF" opacity="0.9" filter="url(#glow)"/>
  <circle cx="160" cy="52" r="2.5" fill="#7EC8FF" opacity="0.7"/>
  <circle cx="140" cy="54" r="2" fill="#00E5FF" opacity="0.5"/>

  <!-- AI sparkle dots bottom left -->
  <circle cx="36" cy="148" r="3" fill="#4A9EFF" opacity="0.6"/>
  <circle cx="48" cy="162" r="2" fill="#00E5FF" opacity="0.4"/>

</svg>
