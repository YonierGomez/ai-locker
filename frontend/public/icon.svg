<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#0A0E1A"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="50%" stop-color="#162D4A"/>
      <stop offset="100%" stop-color="#0F1F33"/>
    </linearGradient>
    <linearGradient id="doorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A3352"/>
      <stop offset="100%" stop-color="#0D1E30"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C8E8"/>
      <stop offset="100%" stop-color="#0096B4"/>
    </linearGradient>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowHandle" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bodyShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- App icon background -->
  <rect x="0" y="0" width="200" height="200" rx="42" fill="url(#bgGrad)"/>

  <!-- LOCKER BODY -->
  <rect x="42" y="28" width="116" height="144" rx="10"
    fill="url(#bodyGrad)"
    stroke="#2A5080"
    stroke-width="1.5"
    filter="url(#bodyShadow)"/>

  <!-- Top highlight edge -->
  <rect x="42" y="28" width="116" height="3" rx="2"
    fill="rgba(255,255,255,0.08)"/>

  <!-- DOOR PANEL -->
  <rect x="52" y="38" width="96" height="124" rx="7"
    fill="url(#doorGrad)"
    stroke="#1E4070"
    stroke-width="1"/>

  <!-- Door panel inner bevel top -->
  <rect x="52" y="38" width="96" height="2" rx="1"
    fill="rgba(255,255,255,0.06)"/>

  <!-- HINGE LEFT top -->
  <rect x="40" y="58" width="8" height="18" rx="3"
    fill="#1A3050"
    stroke="#2A5080"
    stroke-width="1"/>
  <rect x="42" y="62" width="4" height="10" rx="2"
    fill="#0F2040"/>

  <!-- HINGE LEFT bottom -->
  <rect x="40" y="106" width="8" height="18" rx="3"
    fill="#1A3050"
    stroke="#2A5080"
    stroke-width="1"/>
  <rect x="42" y="110" width="4" height="10" rx="2"
    fill="#0F2040"/>

  <!-- VENTILATION SLOTS -->
  <rect x="64" y="48" width="72" height="3" rx="1.5"
    fill="rgba(0,0,0,0.5)"
    stroke="rgba(0,180,216,0.2)"
    stroke-width="0.5"/>
  <rect x="64" y="55" width="72" height="3" rx="1.5"
    fill="rgba(0,0,0,0.5)"
    stroke="rgba(0,180,216,0.2)"
    stroke-width="0.5"/>
  <rect x="64" y="62" width="72" height="3" rx="1.5"
    fill="rgba(0,0,0,0.5)"
    stroke="rgba(0,180,216,0.2)"
    stroke-width="0.5"/>

  <!-- CENTRAL LOCK PANEL -->
  <rect x="62" y="78" width="76" height="72" rx="8"
    fill="#0A1828"
    stroke="#1E4070"
    stroke-width="1.2"/>

  <!-- Lock panel inner highlight -->
  <rect x="62" y="78" width="76" height="2" rx="1"
    fill="rgba(0,229,255,0.08)"/>

  <!-- KEYHOLE outer ring -->
  <circle cx="100" cy="100" r="14"
    fill="#071220"
    stroke="url(#cyanGrad)"
    stroke-width="2"
    filter="url(#glowCyan)"/>

  <!-- KEYHOLE inner ring -->
  <circle cx="100" cy="100" r="9"
    fill="#050D18"
    stroke="rgba(0,229,255,0.3)"
    stroke-width="0.8"/>

  <!-- Keyhole circle top -->
  <circle cx="100" cy="97" r="4.5"
    fill="url(#cyanGrad)"
    filter="url(#glowCyan)"/>

  <!-- Keyhole slot bottom -->
  <rect x="97.5" y="99" width="5" height="8" rx="2.5"
    fill="url(#cyanGrad)"
    filter="url(#glowCyan)"/>

  <!-- HANDLE -->
  <rect x="88" y="118" width="24" height="10" rx="5"
    fill="url(#handleGrad)"
    stroke="rgba(0,229,255,0.4)"
    stroke-width="0.8"
    filter="url(#glowHandle)"/>

  <!-- Handle highlight -->
  <rect x="90" y="119.5" width="20" height="3" rx="1.5"
    fill="rgba(255,255,255,0.2)"/>

  <!-- BOTTOM SECTION - file lines -->
  <rect x="62" y="156" width="76" height="38" rx="6"
    fill="#0A1828"
    stroke="#1A3A5A"
    stroke-width="0.8"/>

  <!-- File line 1 -->
  <circle cx="68" cy="165.5" r="2" fill="rgba(0,229,255,0.6)"/>
  <rect x="73" y="163" width="40" height="3" rx="1.5"
    fill="rgba(0,180,216,0.4)"/>

  <!-- File line 2 -->
  <circle cx="68" cy="173.5" r="2" fill="rgba(0,229,255,0.4)"/>
  <rect x="73" y="171" width="30" height="3" rx="1.5"
    fill="rgba(0,180,216,0.3)"/>

  <!-- File line 3 -->
  <circle cx="68" cy="181.5" r="2" fill="rgba(0,229,255,0.3)"/>
  <rect x="73" y="179" width="36" height="3" rx="1.5"
    fill="rgba(0,180,216,0.2)"/>

  <!-- BASE FEET -->
  <rect x="52" y="170" width="14" height="6" rx="3"
    fill="#0F2035"
    stroke="#1A3A5A"
    stroke-width="0.8"/>
  <rect x="134" y="170" width="14" height="6" rx="3"
    fill="#0F2035"
    stroke="#1A3A5A"
    stroke-width="0.8"/>

  <!-- CYAN ACCENT STRIPE left edge -->
  <rect x="42" y="38" width="3" height="124" rx="1.5"
    fill="url(#cyanGrad)"
    opacity="0.7"/>

</svg>
