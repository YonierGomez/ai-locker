<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Vibrant background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0055FF"/>
      <stop offset="100%" stop-color="#0033AA"/>
    </linearGradient>
    <!-- Locker body -->
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="30%" stop-color="#C8DEFF"/>
      <stop offset="100%" stop-color="#A0C4F0"/>
    </linearGradient>
    <!-- Door panel -->
    <linearGradient id="doorPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D0E8FF"/>
      <stop offset="100%" stop-color="#90B8E8"/>
    </linearGradient>
    <!-- Handle -->
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C0D8F8"/>
    </linearGradient>
    <!-- Cyan accent -->
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00EEFF"/>
      <stop offset="100%" stop-color="#00AACC"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,0,80,0.4)"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Vibrant blue background -->
  <rect width="200" height="200" rx="42" fill="url(#bg)"/>
  <!-- Top shine -->
  <rect width="200" height="90" rx="42" fill="rgba(255,255,255,0.08)"/>
  <!-- Bottom vignette -->
  <rect y="120" width="200" height="80" rx="0" fill="rgba(0,0,60,0.15)"/>

  <!-- LOCKER BODY (main cabinet) — light colored for contrast -->
  <rect x="36" y="24" width="128" height="154" rx="12"
    fill="url(#body)" filter="url(#shadow)"/>

  <!-- Body top highlight -->
  <rect x="36" y="24" width="128" height="5" rx="4"
    fill="rgba(255,255,255,0.7)"/>

  <!-- Body left edge highlight -->
  <rect x="36" y="24" width="4" height="154" rx="2"
    fill="rgba(255,255,255,0.5)"/>

  <!-- Body right shadow -->
  <rect x="160" y="24" width="4" height="154" rx="2"
    fill="rgba(0,0,80,0.15)"/>

  <!-- DOOR PANEL -->
  <rect x="46" y="32" width="108" height="138" rx="8"
    fill="url(#doorPanel)" stroke="rgba(0,80,180,0.3)" stroke-width="1.5"/>

  <!-- Door top highlight -->
  <rect x="46" y="32" width="108" height="4" rx="3"
    fill="rgba(255,255,255,0.6)"/>

  <!-- CYAN ACCENT STRIPE left edge -->
  <rect x="46" y="32" width="5" height="138" rx="2.5"
    fill="url(#accent)"/>

  <!-- VENTILATION SLOTS -->
  <rect x="60" y="42" width="80" height="4" rx="2"
    fill="rgba(0,60,140,0.25)"/>
  <rect x="60" y="50" width="80" height="4" rx="2"
    fill="rgba(0,60,140,0.2)"/>
  <rect x="60" y="58" width="80" height="4" rx="2"
    fill="rgba(0,60,140,0.15)"/>

  <!-- HORIZONTAL DIVIDER -->
  <rect x="46" y="100" width="108" height="2"
    fill="rgba(0,80,180,0.3)"/>

  <!-- HANDLE / LATCH -->
  <rect x="138" y="86" width="10" height="28" rx="5"
    fill="url(#handle)" stroke="rgba(0,80,180,0.4)" stroke-width="1"
    filter="url(#shadow)"/>
  <!-- Handle center line -->
  <rect x="141" y="90" width="4" height="20" rx="2"
    fill="rgba(0,80,180,0.2)"/>

  <!-- LOCK DOT near handle -->
  <circle cx="130" cy="100" r="5"
    fill="rgba(0,40,120,0.6)" stroke="rgba(0,180,255,0.8)" stroke-width="1.5"
    filter="url(#glow)"/>
  <circle cx="130" cy="100" r="2.5"
    fill="#00DDFF"/>

  <!-- AI PANEL (upper center) -->
  <rect x="60" y="68" width="66" height="26" rx="6"
    fill="rgba(0,30,100,0.7)" stroke="rgba(0,180,255,0.5)" stroke-width="1.2"/>

  <!-- "AI" letters — white/cyan on dark panel -->
  <!-- A left stroke -->
  <rect x="68" y="72" width="3" height="16" rx="1.5" fill="#FFFFFF"/>
  <!-- A right stroke -->
  <rect x="77" y="72" width="3" height="16" rx="1.5" fill="#FFFFFF"/>
  <!-- A crossbar -->
  <rect x="68" y="79" width="12" height="2.5" rx="1.25" fill="#FFFFFF"/>
  <!-- A top peak -->
  <rect x="71" y="72" width="6" height="3" rx="1.5" fill="#FFFFFF"/>

  <!-- I top bar -->
  <rect x="87" y="72" width="10" height="2.5" rx="1.25" fill="#00EEFF"/>
  <!-- I stem -->
  <rect x="90.5" y="74.5" width="3" height="10" rx="1.5" fill="#00EEFF"/>
  <!-- I bottom bar -->
  <rect x="87" y="84.5" width="10" height="2.5" rx="1.25" fill="#00EEFF"/>

  <!-- DATA LINES (lower section) -->
  <rect x="60" y="108" width="66" height="50" rx="6"
    fill="rgba(0,30,100,0.5)" stroke="rgba(0,120,200,0.3)" stroke-width="1"/>

  <circle cx="67" cy="118" r="2.5" fill="#00DDFF"/>
  <rect x="73" y="116" width="36" height="3" rx="1.5" fill="rgba(255,255,255,0.7)"/>

  <circle cx="67" cy="127" r="2.5" fill="#00DDFF" opacity="0.8"/>
  <rect x="73" y="125" width="26" height="3" rx="1.5" fill="rgba(255,255,255,0.55)"/>

  <circle cx="67" cy="136" r="2.5" fill="#00DDFF" opacity="0.6"/>
  <rect x="73" y="134" width="32" height="3" rx="1.5" fill="rgba(255,255,255,0.4)"/>

  <circle cx="67" cy="145" r="2.5" fill="#00DDFF" opacity="0.4"/>
  <rect x="73" y="143" width="20" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>

  <!-- FEET -->
  <rect x="46" y="172" width="16" height="6" rx="3"
    fill="rgba(0,40,120,0.5)" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  <rect x="138" y="172" width="16" height="6" rx="3"
    fill="rgba(0,40,120,0.5)" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>

  <!-- Sparkle accents -->
  <circle cx="162" cy="30" r="4" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="172" cy="44" r="2.5" fill="#AADDFF" opacity="0.7"/>
  <circle cx="155" cy="46" r="2" fill="#FFFFFF" opacity="0.5"/>

</svg>
