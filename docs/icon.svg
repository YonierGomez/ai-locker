<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5AADFF"/>
      <stop offset="100%" stop-color="#2277DD"/>
    </linearGradient>
    <linearGradient id="door" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4499EE"/>
      <stop offset="100%" stop-color="#1A5FBB"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#AACCFF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00EEFF"/>
      <stop offset="100%" stop-color="#00AACC"/>
    </linearGradient>
  </defs>

  <!-- No background — transparent -->

  <!-- LOCKER BODY -->
  <rect x="30" y="16" width="140" height="170" rx="16"
    fill="url(#body)"
    style="filter: drop-shadow(0 4px 16px rgba(0,100,255,0.5))"/>

  <!-- Body top highlight -->
  <rect x="30" y="16" width="140" height="6" rx="5"
    fill="rgba(255,255,255,0.35)"/>

  <!-- Body left highlight -->
  <rect x="30" y="16" width="5" height="170" rx="3"
    fill="rgba(255,255,255,0.2)"/>

  <!-- DOOR PANEL -->
  <rect x="42" y="26" width="116" height="152" rx="10"
    fill="url(#door)"/>

  <!-- Door top highlight -->
  <rect x="42" y="26" width="116" height="5" rx="4"
    fill="rgba(255,255,255,0.25)"/>

  <!-- CYAN LEFT STRIPE -->
  <rect x="42" y="26" width="7" height="152" rx="4"
    fill="url(#accent)"/>

  <!-- VENT SLOTS — 3 bold lines -->
  <rect x="60" y="38" width="82" height="6" rx="3"
    fill="rgba(0,30,100,0.35)"/>
  <rect x="60" y="49" width="82" height="6" rx="3"
    fill="rgba(0,30,100,0.25)"/>
  <rect x="60" y="60" width="82" height="6" rx="3"
    fill="rgba(0,30,100,0.18)"/>

  <!-- HORIZONTAL DIVIDER -->
  <rect x="42" y="106" width="116" height="3"
    fill="rgba(0,30,100,0.3)"/>

  <!-- HANDLE -->
  <rect x="144" y="88" width="14" height="34" rx="7"
    fill="url(#handle)"
    style="filter: drop-shadow(0 2px 6px rgba(0,0,80,0.4))"/>
  <rect x="147" y="93" width="8" height="24" rx="4"
    fill="rgba(0,60,180,0.2)"/>

  <!-- LOCK CIRCLE -->
  <circle cx="132" cy="106" r="8"
    fill="rgba(0,20,80,0.5)"
    stroke="rgba(255,255,255,0.6)"
    stroke-width="2.5"/>
  <circle cx="132" cy="106" r="3.5"
    fill="white" opacity="0.9"/>

  <!-- "AI" — bold white letters, center of door -->
  <!-- A -->
  <path d="M66 124 L76 92 L86 124"
    fill="none" stroke="white" stroke-width="7"
    stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="69" y1="114" x2="83" y2="114"
    stroke="white" stroke-width="6" stroke-linecap="round"/>

  <!-- I -->
  <line x1="100" y1="92" x2="100" y2="124"
    stroke="#00EEFF" stroke-width="7" stroke-linecap="round"/>
  <line x1="93" y1="92" x2="107" y2="92"
    stroke="#00EEFF" stroke-width="6" stroke-linecap="round"/>
  <line x1="93" y1="124" x2="107" y2="124"
    stroke="#00EEFF" stroke-width="6" stroke-linecap="round"/>

  <!-- DATA LINES bottom -->
  <circle cx="60" cy="140" r="4.5" fill="white" opacity="0.7"/>
  <rect x="70" y="137" width="56" height="7" rx="3.5"
    fill="rgba(255,255,255,0.4)"/>

  <circle cx="60" cy="155" r="4.5" fill="white" opacity="0.5"/>
  <rect x="70" y="152" width="42" height="7" rx="3.5"
    fill="rgba(255,255,255,0.28)"/>

  <circle cx="60" cy="170" r="4.5" fill="white" opacity="0.35"/>
  <rect x="70" y="167" width="50" height="7" rx="3.5"
    fill="rgba(255,255,255,0.18)"/>

</svg>
