# ┌─────────────────────────────────────────────────────────────────┐
# │  AI Locker — docker-compose                                     │
# │                                                                 │
# │  Base de datos — elige UNA opción:                             │
# │                                                                 │
# │  1. SQLite   → sin variables de DB (por defecto)               │
# │  2. PostgreSQL → activa el servicio postgres-db                │
# │  3. MySQL     → activa el servicio mysql-db                    │
# └─────────────────────────────────────────────────────────────────┘

services:

  # ── Aplicación ─────────────────────────────────────────────────
  app:
    image: yoniergomez/ai-locker:latest
    # Para construir desde el código fuente:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   args:
    #     VITE_BASE_PATH: /ailocker/   # subpath si usas reverse proxy
    container_name: ai-locker
    ports:
      - "9091:3001"
    restart: unless-stopped
    volumes:
      - ai_locker_data:/data
    environment:
      NODE_ENV: production
      PORT: 3001

      # ── SQLite (por defecto — comenta las vars de DB abajo) ─────
      # DB_PATH: /data/ai-locker.db

      # ── PostgreSQL ──────────────────────────────────────────────
      DB_TYPE: postgres
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: ai-locker
      DB_USER: ai-locker
      DB_PASSWORD: secret

      # ── MySQL / MariaDB ─────────────────────────────────────────
      # DB_TYPE: mysql
      # DB_HOST: mysql-db
      # DB_PORT: 3306
      # DB_NAME: ai-locker
      # DB_USER: ai-locker
      # DB_PASSWORD: secret

      # ── O usa un string de conexión completo ────────────────────
      # DATABASE_URL: postgresql://ai-locker:secret@postgres-db:5432/ai-locker
      # DATABASE_URL: mysql://ai-locker:secret@mysql-db:3306/ai-locker

    depends_on:
      postgres-db:
        condition: service_healthy
      # mysql-db:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres-db:
    image: postgres:alpine
    container_name: ai-locker_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai-locker
      POSTGRES_USER: ai-locker
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai-locker -d ai-locker"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MySQL / MariaDB (alternativa a PostgreSQL) ──────────────────
  # Descomenta y ajusta depends_on en el servicio app si lo usas.
  #
  # mysql-db:
  #   image: mysql:9-oracle
  #   container_name: ai-locker_mysql
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_DATABASE: ai-locker
  #     MYSQL_USER: ai-locker
  #     MYSQL_PASSWORD: secret
  #     MYSQL_ROOT_PASSWORD: rootsecret
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   ports:
  #     - "3306:3306"
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uai-locker", "-psecret"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 15s

volumes:
  ai_locker_data:
    driver: local
  postgres_data:
    driver: local
  # mysql_data:
  #   driver: local
