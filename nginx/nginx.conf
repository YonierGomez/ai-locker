    # ── Normaliza /ailocker → /ailocker/ ─────────────────────────
    location = /ailocker {
        return 301 /ailocker/;
    }

    # ── AI Locker — punto de entrada principal ────────────────────
    # sub_filter reescribe las rutas /assets/ → /ailocker/assets/
    # al vuelo en el HTML, sin necesidad de recompilar la imagen.
    location ^~ /ailocker/ {
        proxy_pass         http://192.168.1.100:9091/;  # AI-LOCKER
        proxy_redirect     off;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Desactiva gzip del backend para que sub_filter pueda leer el HTML
        proxy_set_header   Accept-Encoding   "";

        # Reescritura de rutas absolutas del SPA en el HTML
        sub_filter '="/assets/'   '="/ailocker/assets/';
        sub_filter_once off;
        sub_filter_types text/html;
    }

    # ── AI Locker — assets del SPA (reescritos por sub_filter) ───
    location ^~ /ailocker/assets/ {
        proxy_pass       http://192.168.1.100:9091/assets/;
        proxy_set_header Host $host;
        expires          7d;
        add_header       Cache-Control "public";
    }

    # ── AI Locker — API REST (rutas absolutas /api/) ──────────────
    # ^~ tiene prioridad sobre el regex de Kavita que también captura /api/
    location ^~ /api/ {
        proxy_pass         http://192.168.1.100:9091/api/;
        proxy_redirect     off;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── AI Locker — config.js inyectado por el backend ───────────
    location = /config.js {
        proxy_pass       http://192.168.1.100:9091/config.js;
        proxy_set_header Host $host;
    }

    # ── AI Locker — favicon ───────────────────────────────────────
    location = /icon.svg {
        proxy_pass       http://192.168.1.100:9091/icon.svg;
        proxy_set_header Host $host;
    }

    # ── AI Locker — rutas SPA (fallback para F5) ─────────────────
    # El React Router navega a rutas absolutas (/skills, /prompts…).
    # Si el usuario recarga, nginx debe devolverle el index.html.
    location ~ ^/(prompts|notes|snippets|commands|skills|agents|steering|mcp|ai|settings|trash|dashboard)(/.*)?$ {
        rewrite ^ / break;
        proxy_pass         http://192.168.1.100:9091;
        proxy_redirect     off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Accept-Encoding   "";
        sub_filter '="/assets/'   '="/ailocker/assets/';
        sub_filter_once off;
    }
