    # ── Normaliza /ailocker → /ailocker/ ─────────────────────────
    location = /ailocker {
        return 301 /ailocker/;
    }

    # ── AI Locker — punto de entrada principal ────────────────────
    # nginx strip-ea /ailocker/ y pasa / al backend.
    location ^~ /ailocker/ {
        proxy_pass         http://192.168.1.100:9091/;  # AI-LOCKER
        proxy_redirect     off;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # ── AI Locker — API REST (rutas absolutas /api/) ──────────────
    # ^~ tiene prioridad sobre el regex de Kavita que también captura /api/
    location ^~ /api/ {
        proxy_pass         http://192.168.1.100:9091/api/;
        proxy_redirect     off;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── AI Locker — config.js inyectado por el backend ───────────
    location = /config.js {
        proxy_pass       http://192.168.1.100:9091/config.js;
        proxy_set_header Host $host;
    }
